vocab_size: 32
padding_idx: 1

# "deep" variant
# 113M parameters (if standard MHA)
# 141M parameters (if chain-aware attention)
# width:depth ratio = ~7
d_model: 384
n_layers: 64
n_heads: 6
d_ffn: null
ffn_multiplier: null

max_seq_len: 320

# Fraction of head_dim that gets RoPE.
# 1.0 = full RoPE (default); 0.0 = NoPE; values in between = partial RoPE
# (first rope_fraction of head_dim is rotated, remainder is un-rotated).
rope_fraction: 1.0

dropout: 0.1
attention_dropout: 0.1
embedding_dropout: 0.1

use_chain_aware_attention: true
# Projection variant for chain-aware attention; ignored when
# use_chain_aware_attention=false. One of: "separate" (current default,
# separate Q/K/V per self/cross path) or "shared" (single shared Q/K/V).
chain_aware_projection_mode: separate

# Normalization options
norm_type: layernorm # "layernorm" or "rmsnorm"
pre_norm: true
post_norm: false
qk_norm: none # "none", "norm", or "learned_scale"
layer_norm_eps: 1e-6
hybrid_norm: "none" # "none", "standard", or "star"; non-"none" overrides pre/post/qk_norm (Zhuo et al., 2025)


# alternative shape variants
#
# "wide"
# ~142M params (~113M params with standard MHA)
# d_model: 768
# n_heads: 12
# n_layers: 14
#
# "standard"
# ~144M params (~115M params with standard MHA)
# d_model: 512
# n_heads: 8
# n_layers: 36
